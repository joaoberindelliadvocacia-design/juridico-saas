  <!-- Linha dupla superior -->
  <line x1="120" y1="104" x2="560" y2="104" stroke="#8B7536" stroke-width="1.4"/>
  <line x1="120" y1="109" x2="560" y2="109" stroke="#8B7536" stroke-width="0.4"/>

  <!-- JOÃO BERINDELLI -->
  <text x="340" y="178" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="42" font-weight="400" fill="#ffffff" letter-spacing="6">JOÃO BERINDELLI</text>

  <!-- Ornamento: traços + losango -->
  <line x1="120" y1="198" x2="304" y2="198" stroke="#8B7536" stroke-width="0.8"/>
  <polygon points="340,189 351,198 340,207 329,198" fill="#8B7536"/>
  <line x1="376" y1="198" x2="560" y2="198" stroke="#8B7536" stroke-width="0.8"/>

  <!-- ADVOCACIA -->
  <text x="340" y="236" text-anchor="middle" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="300" fill="#c9b97a" letter-spacing="10">ADVOCACIA</text>

  <!-- Linha dupla inferior -->
  <line x1="120" y1="256" x2="560" y2="256" stroke="#8B7536" stroke-width="0.4"/>
  <line x1="120" y1="261" x2="560" y2="261" stroke="#8B7536" stroke-width="1.4"/>


</svg>
